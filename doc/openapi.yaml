components:
  schemas:
    Bebida:
      required:
        - nome
        - litragem
        - valor
        - descricao
        - id_categoria
        - id_marca
        - id_sabor
        - id_tipo_embalagem
      type: object
      properties:
        nome:
          type: string
          description: O número máximo de caracteres é de 120
        litragem:
          type: string
          description: O número máximo de caracteres é de 25
        valor:
          type: number
          format: double
          example: "999.99"
          description: O número máximo de caracteres é 999 e duas casas decimais (.99)
        descricao:
          type: string
          description: O número máximo de caracteres é ilimitado
        id_categoria:
          type: integer
          example: 1
        id_marca:
          type: integer
          example: 3
        id_sabor:
          type: integer
          example: 2
        id_tipo_embalagem:
          type: integer
          example: 2
        caracteristica:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
            example:
              - id: 1
              - id: 2

    Categoria:
      required:
        - nome_categoria
      type: object
      properties:
        nome_categoria:
          type: string
          example: Refrigerante
          description: O número máximo de caracteres é de 30
    
    Marca:
      required:
        - nome_marca
      type: object
      properties:
        nome_marca:
          type: string
          example: Coca Cola
          description: O número máximo de caracteres é de 60
    
    Sabor:
      required:
        - nome_sabor
      type: object
      properties:
        nome_sabor:
          type: string
          example: Cola
          description: O número máximo de caracteres é de 60
    
    Caracteristica:
      required:
        - nome
      type: object
      properties:
        nome:
          type: string
          example: Com gás
          description: O número máximo de caracteres é de 25
    
    TipoEmbalagem:
      required:
        - tipo_embalagem
      type: object
      properties:
        tipo_embalagem:
          type: string
          example: Lata
          description: O número máximo de caracteres é de 40
    
    Foto:
      required:
        - foto
        - id_bebida
      type: object
      properties:
        foto:
          type: string
          example: url da foto
          description: O número máximo de caracteres é de 200
        id_bebida:
          type: integer
          example: 1

    # SCHEMAS PARA OS GETS (RELAÇÕES)
    BebidaGet:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Coca Cola lata 350ML
          description: O número máximo de caracteres é de 120
        litragem:
          type: string
